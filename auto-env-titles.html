<script>
/* כותרות אוטומטיות + צבע פסטלי לסביבות; טיפול מדויק ב-solution כך שיישאר callout מתקפל */
document.addEventListener('DOMContentLoaded', () => {

  // מחיקת כותרות ברירת המחדל של Quarto באנגלית (כמו Remark / Proof)
  document.querySelectorAll('.proof-title').forEach(el => el.remove());

  // --- מספר פרק נוכחי למספור לפי פרק ---
  function chapterNumber() {
    const h1 = document.querySelector('main h1[data-number]');
    if (h1 && h1.getAttribute('data-number')) return h1.getAttribute('data-number').split('.')[0];
    const sec = document.querySelector('.header-section-number');
    if (sec) return sec.textContent.trim().split('.')[0];
    return '1';
  }
  const chap = chapterNumber();

  // --- מפת סביבות: תווית, צבע, והאם ממוספרת ---
  const envs = {
    definition:  { label: 'הגדרה',   color: 'rgba(255, 99, 71, 0.4)',  numbered: true  },
    example:     { label: 'דוגמה',    color: 'rgba(138, 43, 226, 0.3)', numbered: true  },
    exercise:    { label: 'תרגיל',    color: 'rgba(30, 144, 255, 0.35)',numbered: true  },
    remark:      { label: 'הערה',     color: 'rgba(60, 179, 113, 0.35)', numbered: true  },
    theorem:     { label: 'משפט',     color: 'rgba(255, 165, 0, 0.35)', numbered: true  },
    lemma:       { label: 'למה',      color: 'rgba(255, 165, 0, 0.35)', numbered: true  },
    proposition: { label: 'טענה',     color: 'rgba(255, 165, 0, 0.35)', numbered: true  },
    corollary:   { label: 'מסקנה',    color: 'rgba(255, 165, 0, 0.35)', numbered: true  },
    proof:       { label: 'הוכחה',    color: 'rgba(0, 0, 0, 0.15)', numbered: false },
    solution:    { label: 'פתרון',    color: 'rgba(72, 209, 204, 0.35)',numbered: false } // ללא מספור
  };

  // --- נרמול פתרון: שמירה כ-callout מתקפל וזיהוי כ-solution ---
  document.querySelectorAll('div.callout.callout-note[title="הצג פתרון"], div.callout.callout-note[title="Solution"]').forEach(div => {
    div.classList.add('solution');          // מוסיפים solution
    div.setAttribute('collapse', 'true');   // קיפול נשמר
    div.setAttribute('title', 'פתרון');     // כותרת callout
  });

  // --- תיקון כפילות מחלקות: אם יש proof+solution יחד – להסיר proof ---
  document.querySelectorAll('div.solution.proof').forEach(div => div.classList.remove('proof'));
  document.querySelectorAll('div.remark.proof').forEach(div => div.classList.remove('proof'));

  // --- אם יש solution בלי מבנה callout, נבנה header+body כדי לקבל תיבה מתקפלת ---
  document.querySelectorAll('div.solution:not(.callout)').forEach(div => {
    div.classList.add('callout', 'callout-note');
    div.setAttribute('collapse', 'true');
    // header
    const header = document.createElement('div');
    header.className = 'callout-header';
    const titleWrap = document.createElement('div');
    titleWrap.className = 'callout-title-container';
    const title = document.createElement('div');
    title.className = 'callout-title';
    title.textContent = 'פתרון';
    titleWrap.appendChild(title);
    header.appendChild(titleWrap);
    div.insertBefore(header, div.firstChild);
    // body
    const body = document.createElement('div');
    body.className = 'callout-body';
    while (header.nextSibling) body.appendChild(header.nextSibling);
    div.appendChild(body);
  });
// --- מספור משותף (רץ) לכל הסביבות לפי סדר הופעתן ---
  const boxEnvs = ['definition','example','exercise','remark','theorem','lemma','proposition','corollary','proof'];
  let sharedCounter = 0; // מונה אחד משותף לכולם
  const envMap = {}; // מיפוי id → "טענה 2.7" לצורך רפרנסים אוטומטיים

  // תופס את כל הסביבות יחד כדי לשמור על סדר ההופעה במסמך
  const allBoxSelector = boxEnvs.map(env => `div.${env}`).join(', ');
  
  document.querySelectorAll(allBoxSelector).forEach(div => {
    // לא לגעת ב-callout (כמו פתרונות)
    if (div.classList.contains('callout')) return;

    // --- התיקון: מחיקת הכותרת האנגלית המובנית של Quarto ---
    // Quarto שותל את הכותרת שלו בתור תגית span בתוך הפסקה הראשונה
    const quartoNativeTitle = div.querySelector('span.theorem-title');
    if (quartoNativeTitle) {
      quartoNativeTitle.remove(); // מעלים את Theorem 2.1
    }

    // מזהים איזו סביבה זו מתוך הרשימה שלנו
    const env = boxEnvs.find(e => div.classList.contains(e));
    if (!env) return;
    const meta = envs[env];

    // הוספת הכותרת שלנו עם המונה המשותף בעברית
    let title = div.querySelector(':scope > div.theorem-title');
    if (!title) {
      title = document.createElement('div');
      title.className = 'theorem-title custom-title';
      if (meta.numbered) {
        sharedCounter += 1; // מקדם את המונה המשותף
        const fullLabel = `${meta.label} ${chap}.${sharedCounter}`;
        title.textContent = fullLabel;
        // שמירה במפה לרפרנסים אוטומטיים
        if (div.id) envMap[div.id] = `${chap}.${sharedCounter}`;
      } else {
        title.textContent = meta.label;
      }
      div.insertBefore(title, div.firstChild);
    }

    // צבע וצביעת קופסה
    div.style.setProperty('--env-color', meta.color);
    div.classList.add('envbox');
  });

  // --- רפרנסים אוטומטיים: עדכון לינקים שמצביעים לסביבות ממוספרות ---
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    const targetId = link.getAttribute('href').slice(1);
    if (envMap[targetId] && !link.textContent.trim()) {
      link.textContent = envMap[targetId];
    }
  });
console.log('envMap:', envMap);
  // --- צביעת פתרון כ-callout לפי המפה ---
  document.querySelectorAll('div.callout.solution').forEach(div => {
    div.style.setProperty('--env-color', envs.solution.color);
  });

});
</script>
