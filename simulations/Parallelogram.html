<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מקבילית הווקטורים</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 1px solid black;
  }
</style>
</head>
<body>

  <!-- שינוי 1: עדכון הכותרת -->
  <h1>כלל המקבילית</h1>
  <p id="instructions">לחצו על נקודה כדי ליצור את הוקטור הראשון</p>
  <canvas id="interactivePlane" width="600" height="600"></canvas>

<script>
  const canvas = document.getElementById('interactivePlane');
  const ctx = canvas.getContext('2d');
  const instructions = document.getElementById('instructions');

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  const padding = 30;
  const scale = 5;
  const unitSize = (canvas.width - 2 * padding) / (scale * 2);
  
  let clickPoints = [];

  function scaledToPixels(point) {
    return {
      x: centerX + point.x * unitSize,
      y: centerY - point.y * unitSize
    };
  }

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    for(let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0);
      ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize);
      ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY);
    ctx.lineTo(canvas.width - padding, centerY);
    ctx.moveTo(centerX, canvas.height - padding);
    ctx.lineTo(centerX, padding);
    ctx.stroke();

    const headlen = 10;
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.fillText('x', canvas.width - padding + 10, centerY);
    ctx.fillText('y', centerX, padding - 15);

    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = -scale; i <= scale; i++) {
      if (i === 0) continue;
      ctx.fillText(i, centerX + i * unitSize, centerY + 15);
      ctx.fillText(i, centerX - 15, centerY - i * unitSize);
    }
  }

  function drawArrow(p1, p2, color) {
    const headlen = 10;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const angle = Math.atan2(dy, dx);

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  // --- שינוי 2: עדכון פונקציית התוויות ---
  function drawVectorLabel(text, p1, p2, color, offset = {x: 0, y: -10}) {
    const midX = (p1.x + p2.x) / 2 + offset.x;
    const midY = (p1.y + p2.y) / 2 + offset.y;
    
    ctx.fillStyle = color;
    ctx.font = 'italic bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    
    // בדיקה אם מדובר בתווית מורכבת
    if (text === 'v+w' || text === 'v-w') {
        const operator = text.includes('+') ? '+' : '-';
        const parts = ['v', operator, 'w'];

        const totalWidth = ctx.measureText(parts.join('')).width;
        let currentX = midX - totalWidth / 2;
        
        const originalTextAlign = ctx.textAlign;
        ctx.textAlign = 'left';

        parts.forEach(part => {
            const partWidth = ctx.measureText(part).width;
            ctx.fillText(part, currentX, midY);

            if (part === 'v' || part === 'w') {
                const originalFont = ctx.font;
                const arrowMidX = currentX + partWidth / 2;
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('→', arrowMidX, midY - 14);
                ctx.font = originalFont;
                ctx.textAlign = 'left';
            }
            currentX += partWidth;
        });

        ctx.textAlign = originalTextAlign;
    } else {
        // התנהגות רגילה עבור תוויות פשוטות
        ctx.fillText(text, midX, midY);
        const originalFont = ctx.font;
        ctx.font = '16px Arial';
        ctx.fillText('→', midX, midY - 14);
        ctx.font = originalFont;
    }
  }
  
  function drawScene() {
    drawGrid();
    
    if (clickPoints.length === 0) return;

    const origin = {x: 0, y: 0};
    const v = clickPoints[0];
    
    drawArrow(scaledToPixels(origin), scaledToPixels(v), 'blue');
    drawVectorLabel('v', scaledToPixels(origin), scaledToPixels(v), 'blue');

    if (clickPoints.length < 2) return;

    const w = clickPoints[1];
    
    const v_plus_w = { x: v.x + w.x, y: v.y + w.y };
    
    const origin_p = scaledToPixels(origin);
    const v_p = scaledToPixels(v);
    const w_p = scaledToPixels(w);
    const v_plus_w_p = scaledToPixels(v_plus_w);

    drawArrow(origin_p, v_p, 'blue');
    drawVectorLabel('v', origin_p, v_p, 'blue');
    
    drawArrow(origin_p, w_p, 'green');
    drawVectorLabel('w', origin_p, w_p, 'green', {x: 5, y: -10});

    drawArrow(v_p, v_plus_w_p, 'green');
    drawVectorLabel('w', v_p, v_plus_w_p, 'green');

    drawArrow(w_p, v_plus_w_p, 'blue');
    drawVectorLabel('v', w_p, v_plus_w_p, 'blue');

    drawArrow(origin_p, v_plus_w_p, 'red');
    drawVectorLabel('v+w', origin_p, v_plus_w_p, 'red', {x: 10, y: -15});
    
    drawArrow(w_p, v_p, '#8A2BE2');
    drawVectorLabel('v-w', w_p, v_p, '#8A2BE2', {x: -15, y: 15});
  }


  drawGrid();

  canvas.addEventListener('click', function(event) {
    if (clickPoints.length >= 2) {
      clickPoints = [];
    }
    
    const rect = canvas.getBoundingClientRect();
    const pixelX = event.clientX - rect.left;
    const pixelY = event.clientY - rect.top;

    const scaledX = (pixelX - centerX) / unitSize;
    const scaledY = ((pixelY - centerY) * -1) / unitSize;

    clickPoints.push({x: scaledX, y: scaledY});

    if (clickPoints.length === 1) {
      instructions.textContent = 'לחצו על נקודה נוספת (לא קרובה מדי) כדי ליצור את הוקטור השני';
    } else if (clickPoints.length === 2) {
      instructions.textContent = 'נהדר! לחצו שוב כדי להתחיל מחדש';
    } else {
      instructions.textContent = 'לחצו על נקודה כדי ליצור את הוקטור הראשון';
    }
    
    drawScene();
  });
</script>

</body>
</html>
