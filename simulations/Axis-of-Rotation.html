<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>וקטור מסתובב במישור</title>
<style>
  body { margin: 0; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    z-index: 100;
    display:block;
    color: black;
    font-family: Arial, sans-serif;
    background-color: rgba(255,255,255,0.5);
    padding: 5px;
  }
</style>
</head>
<body>
  <div id="info">
    <h1>וקטור מסתובב במישור</h1>
    <!-- שינוי: עדכון ההסבר -->
    <p>מוצג מישור, וקטור נורמל וגם וקטור מסתובב שמוכל במישור ותמיד מאונך לנורמל</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // 1. הגדרות בסיסיות
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 2. תאורה ושליטה
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  camera.up.set(0, 0, 1);
  camera.position.set(5, 5, 5);
  controls.update();
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(5, 10, 7.5);
  scene.add(directionalLight);

  // 3. עזרי המחשה (צירים ורשת)
  const gridHelper = new THREE.GridHelper(10, 10);
  gridHelper.rotation.x = Math.PI / 2;
  scene.add(gridHelper);
  const axisLength = 5;
  const origin = new THREE.Vector3(0,0,0);
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, axisLength, 0x000000));
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0), origin, axisLength, 0x000000));
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), origin, axisLength, 0x000000));
  
  // --- שינוי: הוספת תוויות לצירים ---
  function createAxisLabel(text, position) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      context.font = 'Bold 60px Arial';
      context.fillStyle = 'rgba(0,0,0,1.0)';
      context.fillText(text, 0, 60);
      const texture = new THREE.CanvasTexture(canvas);
      const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
      const sprite = new THREE.Sprite(spriteMaterial);
      sprite.scale.set(2, 1, 1.0);
      sprite.position.copy(position);
      return sprite;
  }
  const labelOffset = 0.4;
  scene.add(createAxisLabel('x', new THREE.Vector3(axisLength + labelOffset, 0, 0)));
  scene.add(createAxisLabel('y', new THREE.Vector3(0, axisLength + labelOffset, 0)));
  scene.add(createAxisLabel('z', new THREE.Vector3(0, 0, axisLength + labelOffset)));
  // ------------------------------------

  // 4. יצירת האובייקטים הסטטיים
  const planeNormal = new THREE.Vector3(1, 2, 3).normalize();
  const planeGeom = new THREE.PlaneGeometry(10, 10);
  const planeMat = new THREE.MeshPhongMaterial({color: 0xffa500, opacity: 0.5, transparent: true, side: THREE.DoubleSide});
  const planeMesh = new THREE.Mesh(planeGeom, planeMat);
  const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), planeNormal);
  planeMesh.applyQuaternion(quaternion);
  scene.add(planeMesh);
  
  const normalVector = new THREE.Vector3(1, 2, 3);
  const normalArrow = new THREE.ArrowHelper(normalVector.clone().normalize(), origin, normalVector.length(), 0xff0000);
  scene.add(normalArrow);

  // 5. הגדרות לאנימציה של הווקטור המסתובב
  let rotatingArrow = null;
  let angle = 0;
  const speed = 0.02;
  const rotationRadius = 3;

  const basisV1 = new THREE.Vector3(2, -1, 0).normalize();
  const basisV2 = new THREE.Vector3().crossVectors(planeNormal, basisV1).normalize();

  // 6. לולאת האנימציה הראשית
  function animate() {
    requestAnimationFrame(animate);

    angle = (angle + speed) % (2 * Math.PI);

    if (rotatingArrow) {
      scene.remove(rotatingArrow);
    }
    
    const rotatingVector = new THREE.Vector3()
        .add(basisV1.clone().multiplyScalar(Math.cos(angle) * rotationRadius))
        .add(basisV2.clone().multiplyScalar(Math.sin(angle) * rotationRadius));
    
    rotatingArrow = new THREE.ArrowHelper(
        rotatingVector.clone().normalize(),
        origin,
        rotatingVector.length(),
        0x800080
    );
    scene.add(rotatingArrow);

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

</script>
</body>
</html>
