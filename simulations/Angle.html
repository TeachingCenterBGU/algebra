<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מכפלה סקלרית</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  h1 {
    text-align: center;
    width: 100%; 
  }
  .main-container {
    display: flex;
    align-items: center;
    gap: 25px;
  }
  canvas {
    border: 1px solid black;
  }
  #info-panel {
    direction: ltr;
    text-align: left;
    font-size: 1.2em;
    line-height: 2;
    border: 1px solid #ccc;
    padding: 10px 30px;
    border-radius: 8px;
    width: 250px;
  }
  #info-panel .v-color { color: blue; }
  #info-panel .w-color { color: green; }
  #info-panel .angle-color { color: #8A2BE2; }

  /* שינוי: החלפת הבורר span[id] לקלאס .value כדי שיחול גם על "rad" */
  #info-panel .value {
    font-weight: bold;
    color: #c0392b;
  }
  .vector-symbol {
      position: relative;
      display: inline-block;
      font-style: italic;
      width: 1ch;
      text-align: center;
  }
  .vector-symbol .arrow {
      position: absolute;
      font-style: normal;
      font-weight: normal;
      top: -16px; 
      left: 0;
      width: 100%;
  }
</style>
</head>
<body>

  <h1>מכפלה סקלרית</h1>
  <p id="instructions">לחצו על נקודה כדי ליצור את הוקטור הראשון</p>
  
  <div class="main-container">
    <canvas id="interactivePlane" width="600" height="500"></canvas>
    <div id="info-panel">
      <!-- שינוי: הוספת קלאס "value" לכל הערכים והיחידות -->
      <div class="v-color">||<span class="vector-symbol">v<span class="arrow">→</span></span>|| = <span class="value" id="v-mag">...</span></div>
      <div class="w-color">||<span class="vector-symbol">w<span class="arrow">→</span></span>|| = <span class="value" id="w-mag">...</span></div>
      <div><span class="vector-symbol v-color">v<span class="arrow">→</span></span> · <span class="vector-symbol w-color">w<span class="arrow">→</span></span> = <span class="value" id="dot-prod">...</span></div>
      <div class="angle-color">α = <span class="value" id="angle">...</span> <span class="value">rad</span></div>
    </div>
  </div>

<script>
  const canvas = document.getElementById('interactivePlane');
  const ctx = canvas.getContext('2d');
  const instructions = document.getElementById('instructions');
  const vMagDisplay = document.getElementById('v-mag');
  const wMagDisplay = document.getElementById('w-mag');
  const dotProdDisplay = document.getElementById('dot-prod');
  const angleDisplay = document.getElementById('angle');

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  const padding = 30;
  const scale = 5;
  const unitSize = (canvas.width - 2 * padding) / (scale * 2);
  
  let clickPoints = [];

  function scaledToPixels(point) {
    return {
      x: centerX + point.x * unitSize,
      y: centerY - point.y * unitSize
    };
  }

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    for(let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0);
      ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize);
      ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY);
    ctx.lineTo(canvas.width - padding, centerY);
    ctx.moveTo(centerX, canvas.height - padding);
    ctx.lineTo(centerX, padding);
    ctx.stroke();
    
    const headlen = 10;
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', canvas.width - padding + 10, centerY);
    ctx.fillText('y', centerX, padding - 15);
  }

  function drawArrow(p1, p2, color) {
    const headlen = 10;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const angle = Math.atan2(dy, dx);

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }
  
  function drawAngleArc(v, w) {
      const startAngle = Math.atan2(-v.y, v.x);
      const endAngle = Math.atan2(-w.y, w.x);
      const crossProduct = v.x * w.y - v.y * w.x;
      const isCounterClockwise = crossProduct > 0;
      
      ctx.beginPath();
      ctx.strokeStyle = '#8A2BE2';
      ctx.lineWidth = 1.5;
      ctx.arc(centerX, centerY, 50, startAngle, endAngle, isCounterClockwise);
      ctx.stroke();
  }


  function drawSceneAndCalc() {
    drawGrid();
    
    vMagDisplay.textContent = '...';
    wMagDisplay.textContent = '...';
    dotProdDisplay.textContent = '...';
    angleDisplay.textContent = '...';

    if (clickPoints.length < 1) return;

    const origin = {x: 0, y: 0};
    const v = clickPoints[0];
    
    drawArrow(scaledToPixels(origin), scaledToPixels(v), 'blue');

    const vMag = Math.sqrt(v.x**2 + v.y**2);
    vMagDisplay.textContent = vMag.toFixed(2);

    if (clickPoints.length < 2) return;

    const w = clickPoints[1];
    
    drawArrow(scaledToPixels(origin), scaledToPixels(w), 'green');

    const wMag = Math.sqrt(w.x**2 + w.y**2);
    wMagDisplay.textContent = wMag.toFixed(2);

    const dotProduct = v.x * w.x + v.y * w.y;
    dotProdDisplay.textContent = dotProduct.toFixed(2);

    if (vMag > 0 && wMag > 0) {
      const cosTheta = dotProduct / (vMag * wMag);
      const angleRad = Math.acos(Math.max(-1, Math.min(1, cosTheta)));
      angleDisplay.textContent = `${angleRad.toFixed(2)}`;
      drawAngleArc(v, w);
    } else {
      angleDisplay.textContent = '0.00';
    }
  }

  drawGrid();

  canvas.addEventListener('click', function(event) {
    if (clickPoints.length >= 2) {
      clickPoints = [];
    }
    
    const rect = canvas.getBoundingClientRect();
    const pixelX = event.clientX - rect.left;
    const pixelY = event.clientY - rect.top;

    const scaledX = (pixelX - centerX) / unitSize;
    const scaledY = ((pixelY - centerY) * -1) / unitSize;

    clickPoints.push({x: scaledX, y: scaledY});
    
    if (clickPoints.length === 1) {
      instructions.textContent = 'לחצו על נקודה נוספת כדי ליצור את הוקטור השני';
    } else if (clickPoints.length === 2){
      instructions.textContent = 'לחצו שוב כדי להתחיל מחדש';
    } else {
      instructions.textContent = 'לחצו על נקודה כדי ליצור את הוקטור הראשון';
    }
    
    drawSceneAndCalc();
  });
</script>

</body>
</html>
