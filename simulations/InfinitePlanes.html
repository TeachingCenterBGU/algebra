<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מישור מסתובב סביב ישר</title>
<style>
  body { margin: 0; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    z-index: 100;
    display:block;
    color: black;
    font-family: Arial, sans-serif;
    background-color: rgba(255,255,255,0.5);
    padding: 5px;
  }
</style>
</head>
<body>
  <div id="info">
    <h1>מישור מסתובב סביב ישר</h1>
    <p>המישור הכתום מסתובב באופן רציף, אך תמיד מכיל את הישר הכחול</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // 1. הגדרות בסיסיות
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 2. תאורה ושליטה
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  camera.up.set(0, 0, 1);
  camera.position.set(8, 8, 8);
  controls.update();
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(5, 10, 7.5);
  scene.add(directionalLight);

  // 3. עזרי המחשה (צירים ורשת)
  const gridHelper = new THREE.GridHelper(20, 20);
  gridHelper.rotation.x = Math.PI / 2;
  scene.add(gridHelper);
  const axisLength = 7;
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), axisLength, 0x000000));
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), axisLength, 0x000000));
  scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), axisLength, 0x000000));
  
  // --- שינוי: הוספת תוויות לצירים ---
  function createAxisLabel(text, position) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      context.font = 'Bold 60px Arial';
      context.fillStyle = 'rgba(0,0,0,1.0)';
      context.fillText(text, 0, 60);
      const texture = new THREE.CanvasTexture(canvas);
      const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
      const sprite = new THREE.Sprite(spriteMaterial);
      sprite.scale.set(2, 1, 1.0);
      sprite.position.copy(position);
      return sprite;
  }
  const labelOffset = 0.4;
  scene.add(createAxisLabel('x', new THREE.Vector3(axisLength + labelOffset, 0, 0)));
  scene.add(createAxisLabel('y', new THREE.Vector3(0, axisLength + labelOffset, 0)));
  scene.add(createAxisLabel('z', new THREE.Vector3(0, 0, axisLength + labelOffset)));
  // ------------------------------------

  // 4. יצירת האובייקטים
  const p1 = new THREE.Vector3(1, -2, 1);
  const p2 = new THREE.Vector3(-1, 2, 3);
  const lineDirection = new THREE.Vector3().subVectors(p2, p1).normalize();
  
  const lineGeom = new THREE.BufferGeometry().setFromPoints([
      p1.clone().add(lineDirection.clone().multiplyScalar(-20)),
      p1.clone().add(lineDirection.clone().multiplyScalar(20))
  ]);
  const lineMat = new THREE.LineBasicMaterial({color: 0x0000ff, linewidth: 3});
  const line = new THREE.Line(lineGeom, lineMat);
  scene.add(line);

  const planeGeom = new THREE.PlaneGeometry(15, 15);
  const planeMat = new THREE.MeshPhongMaterial({color: 0xffa500, opacity: 0.5, transparent: true, side: THREE.DoubleSide});
  const planeMesh = new THREE.Mesh(planeGeom, planeMat);
  planeMesh.position.copy(p1); 
  scene.add(planeMesh);
  
  // 5. הגדרות לאנימציה
  let angle = 0;
  const speed = 0.01;

  let initialNormal;
  if (Math.abs(lineDirection.z) > 0.9) {
      initialNormal = new THREE.Vector3(1,0,0);
  } else {
      initialNormal = new THREE.Vector3(0,0,1);
  }
  initialNormal.cross(lineDirection).normalize();
  
  // 6. לולאת האנימציה הראשית
  function animate() {
    requestAnimationFrame(animate);

    angle = (angle + speed) % (2 * Math.PI);
    
    const rotationQuaternion = new THREE.Quaternion().setFromAxisAngle(lineDirection, angle);
    const currentNormal = initialNormal.clone().applyQuaternion(rotationQuaternion);
    const planeQuaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), currentNormal);
    planeMesh.quaternion.copy(planeQuaternion);
    
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
