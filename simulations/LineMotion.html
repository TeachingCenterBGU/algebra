<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצגה פרמטרית של ישר</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 1px solid black;
  }
</style>
</head>
<body>

  <h1>הצגה פרמטרית של ישר</h1>
  <p>מכפילים את הוקטור בסקלר שעובר על פני המספרים הממשיים כדי לכסות את כל הישר</p>
  <canvas id="animationPlane" width="600" height="600"></canvas>

<script>
  const canvas = document.getElementById('animationPlane');
  const ctx = canvas.getContext('2d');

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  const padding = 30;
  const scale = 5;
  const unitSize = (canvas.width - 2 * padding) / (scale * 2);
  
  // --- שינוי כאן: c הוחלף ב-t ---
  let t = 1; // ערך התחלתי
  let direction = 1;
  const speed = 0.03;
  const baseVector = { x: 1, y: 2 };
  // --- סוף השינוי ---

  function scaledToPixels(point) {
    return {
      x: centerX + point.x * unitSize,
      y: centerY - point.y * unitSize
    };
  }

  function drawGrid() {
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    for(let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0);
      ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize);
      ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY);
    ctx.lineTo(canvas.width - padding, centerY);
    ctx.moveTo(centerX, canvas.height - padding);
    ctx.lineTo(centerX, padding);
    ctx.stroke();

    const headlen = 10;
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', canvas.width - padding + 10, centerY);
    ctx.fillText('y', centerX, padding - 15);
  }

  function drawArrow(p1, p2, color) {
    const headlen = 10;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const angle = Math.atan2(dy, dx);

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function drawLine(p1, p2, color) {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- שינוי כאן: c הוחלף ב-t ---
    t += direction * speed;
    if (t > scale || t < -scale) {
      direction *= -1;
    }
    // --- סוף השינוי ---

    drawGrid();

    const lineStart = scaledToPixels({ x: -scale, y: -2 * scale });
    const lineEnd = scaledToPixels({ x: scale, y: 2 * scale });
    drawLine(lineStart, lineEnd, 'blue');
    
    ctx.fillStyle = 'blue';
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('y=2x', lineEnd.x - 40, lineEnd.y - 10);

    const origin = {x: 0, y: 0};
    // --- שינוי כאן: c הוחלף ב-t ---
    const animatedVector = {
      x: baseVector.x * t,
      y: baseVector.y * t
    };
    // --- סוף השינוי ---

    const origin_p = scaledToPixels(origin);
    const animatedVector_p = scaledToPixels(animatedVector);

    drawArrow(origin_p, animatedVector_p, 'red');

    ctx.fillStyle = 'black';
    ctx.font = '16px Arial';
    ctx.textAlign = 'right';
    
    // --- שינוי כאן: c הוחלף ב-t ---
    ctx.fillText(`t = ${t.toFixed(2)}`, canvas.width - padding, padding);
    
    const coordinatesText = `(x,y) = (${animatedVector.x.toFixed(2)}, ${animatedVector.y.toFixed(2)})`;
    ctx.fillText(coordinatesText, canvas.width - padding, padding + 20);
    // --- סוף השינוי ---

    requestAnimationFrame(animate);
  }

  animate();

</script>

</body>
</html>
