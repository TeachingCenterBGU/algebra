<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>הצגה פרמטרית של ישר</title>

  <style>
    body {
      margin: 16px;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    /* מכל ריבועי רספונסיבי לקנבס */
    #sim-wrap {
      width: 100%;
      max-width: 1000px;   /* ניתן להגדיל אם רוצים */
      aspect-ratio: 1 / 1; /* ריבוע */
      margin: 0 auto;
      position: relative;
    }

    /* הקנבס ממלא את המכל */
    #animationPlane {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* יוסתר במצב הטמעה */
    .embed-hide {
      display: none !important;
    }
  </style>
</head>
<body>

  <h1 id="title">הצגה פרמטרית של ישר</h1>
  <p id="lead">מכפילים את הוקטור בסקלר שעובר על פני המספרים הממשיים כדי לכסות את כל הישר</p>

  <div id="sim-wrap">
    <canvas id="animationPlane"></canvas>
  </div>

  <script>
    // מצב הטמעה: אם יש ?embed=1 ב-URL נחביא כותרות ומרווחים כדי שהטמעה תהיה קומפקטית
    const params = new URLSearchParams(location.search);
    const EMBED = params.has('embed');

    if (EMBED) {
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('title')?.classList.add('embed-hide');
        document.getElementById('lead')?.classList.add('embed-hide');
        document.body.style.margin = '0';
      });
    }

    const wrap   = document.getElementById('sim-wrap');
    const canvas = document.getElementById('animationPlane');
    const ctx    = canvas.getContext('2d');

    // הפיכת הקנבס לרספונסיבי, כולל תמיכה במסכים חדים דרך devicePixelRatio
    function resizeCanvas() {
      const cssSize = wrap.clientWidth;             // פיקסלי CSS
      const dpr = window.devicePixelRatio || 1;     // רזולוציה אמיתית

      // גודל ויזואלי
      canvas.style.width  = cssSize + 'px';
      canvas.style.height = cssSize + 'px';

      // גודל פנימי אמיתי
      canvas.width  = Math.round(cssSize * dpr);
      canvas.height = Math.round(cssSize * dpr);

      // מציירים ביחידות של CSS אך חדים לפי dpr
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // גאומטריה מחושבת מהגודל הנוכחי של הקנבס
    function geom() {
      const W = canvas.clientWidth;  // יחידות CSS
      const H = canvas.clientHeight; // יחידות CSS
      const centerX = W / 2;
      const centerY = H / 2;
      const padding = 30;
      const scale   = 5; // טווח יחידות על הצירים לכל כיוון
      const unitSize = (Math.min(W, H) - 2 * padding) / (scale * 2);
      return { W, H, centerX, centerY, padding, scale, unitSize };
    }

    // פרמטר האנימציה
    let t = 1;              // ערך התחלתי
    let direction = 1;
    const speed = 0.03;
    const baseVector = { x: 1, y: 2 };

    function scaledToPixels(point, g) {
      return {
        x: g.centerX + point.x * g.unitSize,
        y: g.centerY - point.y * g.unitSize
      };
    }

    function drawGrid(g) {
      // רשת דקה
      ctx.beginPath();
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      for (let i = -g.scale; i <= g.scale; i++) {
        ctx.moveTo(g.centerX + i * g.unitSize, g.padding);
        ctx.lineTo(g.centerX + i * g.unitSize, g.H - g.padding);
        ctx.moveTo(g.padding, g.centerY + i * g.unitSize);
        ctx.lineTo(g.W - g.padding, g.centerY + i * g.unitSize);
      }
      ctx.stroke();

      // צירים
      ctx.beginPath();
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 2;
      ctx.moveTo(g.padding, g.centerY);
      ctx.lineTo(g.W - g.padding, g.centerY);
      ctx.moveTo(g.centerX, g.H - g.padding);
      ctx.lineTo(g.centerX, g.padding);
      ctx.stroke();

      // חיצי צירים
      const headlen = 10;
      ctx.beginPath();
      // x
      let axisEndX = g.W - g.padding;
      ctx.moveTo(axisEndX, g.centerY);
      ctx.lineTo(axisEndX - headlen, g.centerY - headlen / 2);
      ctx.moveTo(axisEndX, g.centerY);
      ctx.lineTo(axisEndX - headlen, g.centerY + headlen / 2);
      // y
      let axisEndY = g.padding;
      ctx.moveTo(g.centerX, axisEndY);
      ctx.lineTo(g.centerX - headlen / 2, axisEndY + headlen);
      ctx.moveTo(g.centerX, axisEndY);
      ctx.lineTo(g.centerX + headlen / 2, axisEndY + headlen);
      ctx.stroke();

      // תוויות צירים
      ctx.fillStyle = 'black';
      ctx.font = 'italic 16px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('x', g.W - g.padding + 10, g.centerY);
      ctx.fillText('y', g.centerX, g.padding - 15);
    }

    function drawArrow(p1, p2, color) {
      const headlen = 10;
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const angle = Math.atan2(dy, dx);

      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
      ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
      ctx.stroke();
    }

    function drawLine(p1, p2, color) {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }

    function animate() {
      const g = geom();

      // ניקוי הקנבס ביחידות CSS
      ctx.clearRect(0, 0, g.W, g.H);

      // עדכון t
      t += direction * speed;
      if (t > g.scale || t < -g.scale) direction *= -1;

      // ציור גריד וצירים
      drawGrid(g);

      // קו y=2x
      const lineStart = scaledToPixels({ x: -g.scale, y: -2 * g.scale }, g);
      const lineEnd   = scaledToPixels({ x:  g.scale, y:  2 * g.scale }, g);
      drawLine(lineStart, lineEnd, 'blue');

      // תווית y=2x
      ctx.fillStyle = 'blue';
      ctx.font = '14px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('y = 2x', lineEnd.x - 40, lineEnd.y - 10);

      // הוקטור המונפש מן הראשית
      const origin = { x: 0, y: 0 };
      const animatedVector = { x: baseVector.x * t, y: baseVector.y * t };

      const origin_p = scaledToPixels(origin, g);
      const animatedVector_p = scaledToPixels(animatedVector, g);
      drawArrow(origin_p, animatedVector_p, 'red');

      // טקסט מידע
      ctx.fillStyle = 'black';
      ctx.font = '16px Arial';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(`t = ${t.toFixed(2)}`, g.W - g.padding, g.padding);
      ctx.fillText(`(x,y) = (${animatedVector.x.toFixed(2)}, ${animatedVector.y.toFixed(2)})`, g.W - g.padding, g.padding + 22);

      requestAnimationFrame(animate);
    }

    // התחלה
    resizeCanvas();
    window.addEventListener('resize', () => {
      resizeCanvas();
      // הגאומטריה מחושבת מחדש בכל פריים
    });
    requestAnimationFrame(animate);
  </script>
</body>
</html>
