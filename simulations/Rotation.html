<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מטריצת סיבוב</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 1px solid black;
    cursor: crosshair;
  }
  #controls {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 15px 0;
    width: 500px;
  }
  #angle-slider {
      flex-grow: 1;
  }
  #matrix-display {
    display: flex;
    align-items: center;
    gap: 10px;
    direction: ltr;
  }
  #matrix-values {
    display: grid;
    grid-template-columns: 60px 60px;
    gap: 10px;
  }
  .bracket { font-size: 3.5em; font-weight: lighter; color: #555; }
  .matrix-val { text-align: center; font-family: monospace; font-size: 1.2em; }
</style>
</head>
<body>

  <h1>העתקת סיבוב המוגדרת על ידי זווית</h1>
  <p id="instructions">בחרו זווית סיבוב, ואז לחצו על המישור כדי לסובב וקטור</p>

  <div id="controls">
    <label for="angle-slider">זווית (θ):</label>
    <input type="range" id="angle-slider" min="0" max="6.28" value="0.785" step="0.01">
    <span id="angle-value">... rad</span>
  </div>

  <div id="matrix-display">
      <span>A =</span>
      <span class="bracket">(</span>
      <div id="matrix-values">
          <span id="a11" class="matrix-val">...</span>
          <span id="a12" class="matrix-val">...</span>
          <span id="a21" class="matrix-val">...</span>
          <span id="a22" class="matrix-val">...</span>
      </div>
      <span class="bracket">)</span>
  </div>

  <canvas id="interactivePlane" width="600" height="500"></canvas>

<script>
  const canvas = document.getElementById('interactivePlane');
  const ctx = canvas.getContext('2d');
  const angleSlider = document.getElementById('angle-slider');
  const angleValueDisplay = document.getElementById('angle-value');
  const instructions = document.getElementById('instructions');
  const matrixDisplays = {
      a11: document.getElementById('a11'), a12: document.getElementById('a12'),
      a21: document.getElementById('a21'), a22: document.getElementById('a22')
  };

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const scale = 5;
  const unitSize = canvas.width / (scale * 2);

  let vectorPair = null;

  function pixelsToScaled(p) { return { x: (p.x - centerX) / unitSize, y: (p.y - centerY) / -unitSize }; }
  
  function drawGridAndAxes() {
    const padding = 20;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    for (let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0); ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize); ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();
    
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY); ctx.lineTo(canvas.width - padding, centerY);
    ctx.moveTo(centerX, canvas.height - padding); ctx.lineTo(centerX, padding);
    ctx.stroke();
    
    const headlen = 10;
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', canvas.width - padding + 10, centerY + 5);
    // שינוי 3: הנמכת התווית y
    ctx.fillText('y', centerX, padding - 10);
  }
  
  function drawArrow(p_scaled, color, lineWidth = 2) {
    const p_pixels = { x: centerX + p_scaled.x * unitSize, y: centerY - p_scaled.y * unitSize };
    const origin_pixels = { x: centerX, y: centerY };
    if (Math.hypot(p_scaled.x, p_scaled.y) < 0.01) return;
    
    const headlen = 10;
    const dx = p_pixels.x - origin_pixels.x;
    const dy = p_pixels.y - origin_pixels.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.moveTo(origin_pixels.x, origin_pixels.y);
    ctx.lineTo(p_pixels.x, p_pixels.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle - Math.PI / 6), p_pixels.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle + Math.PI / 6), p_pixels.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function updateMatrixDisplay() {
      const theta = parseFloat(angleSlider.value);
      // שינוי 2: הוספת תצוגת מעלות
      const degrees = (theta * 180 / Math.PI).toFixed(1);
      angleValueDisplay.innerHTML = `${theta.toFixed(2)} rad &nbsp; (${degrees}&deg;)`;

      const cos = Math.cos(theta);
      const sin = Math.sin(theta);
      
      matrixDisplays.a11.textContent = cos.toFixed(2);
      matrixDisplays.a12.textContent = (-sin).toFixed(2);
      matrixDisplays.a21.textContent = sin.toFixed(2);
      matrixDisplays.a22.textContent = cos.toFixed(2);

      vectorPair = null;
      instructions.textContent = 'בחרו זווית סיבוב, ואז לחצו על המישור כדי לסובב וקטור';
      drawScene();
  }

  function drawScene() {
      drawGridAndAxes();
      if (vectorPair) {
          drawArrow(vectorPair.v, 'blue', 3);
          drawArrow(vectorPair.Av, 'red', 3);
      }
  }

  canvas.addEventListener('click', (event) => {
      if (vectorPair) return;

      const rect = canvas.getBoundingClientRect();
      const pixelPos = { x: event.clientX - rect.left, y: event.clientY - rect.top };
      const v = pixelsToScaled(pixelPos);
      
      const theta = parseFloat(angleSlider.value);
      const cos = Math.cos(theta);
      const sin = Math.sin(theta);
      
      const Av = {
          x: v.x * cos - v.y * sin,
          y: v.x * sin + v.y * cos
      };

      vectorPair = { v, Av };
      // שינוי 1: עדכון ההנחיה
      instructions.textContent = 'שנו את הזווית כדי להתחיל מחדש';
      drawScene();
  });

  angleSlider.addEventListener('input', updateMatrixDisplay);

  updateMatrixDisplay();
  drawScene();

</script>
</body>
</html>
