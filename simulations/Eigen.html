<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ערכים ווקטורים עצמיים</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: Arial, sans-serif; }
  .container { display: flex; gap: 20px; margin-top: 10px; }
  .canvas-container { display: flex; flex-direction: column; align-items: center; }
  canvas { border: 1px solid black; }
  #controls-container { display: flex; align-items: center; gap: 30px; margin: 15px 0; }
  #matrix-container { display: flex; align-items: center; gap: 10px; }
  #matrix-input { display: grid; grid-template-columns: 50px 50px; gap: 10px; direction: ltr; }
  .bracket { font-size: 3.5em; font-weight: lighter; color: #555; }
  input[type="number"] { width: 40px; font-size: 1.1em; text-align: center; }
  #results-panel { font-size: 1.1em; line-height: 1.6; border-left: 2px solid #ccc; padding-left: 20px; min-height: 50px; display: flex; flex-direction: column; justify-content: center;}
  #results-panel span { font-family: monospace; font-weight: bold; }
  .eigen-1 { color: #008000; }
  .eigen-2 { color: #800080; }
</style>
</head>
<body>

  <h1>ערכים ווקטורים עצמיים של העתקה לינארית</h1>
  <p>שנו את המטריצה וראו את ההשפעה על הוקטורים והערכים העצמיים שלה</p>

  <div id="controls-container">
    <div id="matrix-container">
      <span>A =</span>
      <span class="bracket">(</span>
      <div id="matrix-input">
        <input type="number" id="a" value="3" step="0.5"><input type="number" id="b" value="1" step="0.5">
        <input type="number" id="c" value="1" step="0.5"><input type="number" id="d" value="2" step="0.5">
      </div>
      <span class="bracket">)</span>
    </div>
    <div id="results-panel">
        <div id="eigen-results">
            <div><span class="eigen-1">λ₁ = <span id="lambda1">...</span></span>, <span class="eigen-1">v₁ = <span id="vec1">...</span></span></div>
            <div><span class="eigen-2">λ₂ = <span id="lambda2">...</span></span>, <span class="eigen-2">v₂ = <span id="vec2">...</span></span></div>
        </div>
        <div id="no-eigen-message" style="display: none;">אין ערכים עצמיים ממשיים</div>
    </div>
  </div>

  <div class="container">
    <div class="canvas-container">
      <h3>מרחב התחום</h3>
      <canvas id="sourceCanvas" width="400" height="400"></canvas>
    </div>
    <div class="canvas-container">
      <h3>מרחב הטווח</h3>
      <canvas id="targetCanvas" width="400" height="400"></canvas>
    </div>
  </div>

<script>
  const sourceCanvas = document.getElementById('sourceCanvas');
  const targetCanvas = document.getElementById('targetCanvas');
  const sourceCtx = sourceCanvas.getContext('2d');
  const targetCtx = targetCanvas.getContext('2d');
  const matrixInputs = { a: document.getElementById('a'), b: document.getElementById('b'), c: document.getElementById('c'), d: document.getElementById('d') };
  const lambda1_disp = document.getElementById('lambda1');
  const lambda2_disp = document.getElementById('lambda2');
  const vec1_disp = document.getElementById('vec1');
  const vec2_disp = document.getElementById('vec2');
  const eigenResultsDiv = document.getElementById('eigen-results');
  const noEigenMessageDiv = document.getElementById('no-eigen-message');

  const centerX = sourceCanvas.width / 2;
  const centerY = sourceCanvas.height / 2;
  const scale = 5;
  const unitSize = sourceCanvas.width / (scale * 2);

  function drawGridAndAxes(ctx) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    const padding = 20;
    ctx.beginPath(); ctx.strokeStyle = '#eee';
    for (let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0); ctx.lineTo(centerX + i * unitSize, ctx.canvas.height);
      ctx.moveTo(0, centerY + i * unitSize); ctx.lineTo(ctx.canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();
    
    ctx.beginPath(); ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY); ctx.lineTo(ctx.canvas.width - padding, centerY);
    ctx.moveTo(centerX, ctx.canvas.height - padding); ctx.lineTo(centerX, padding);
    ctx.stroke();

    const headlen = 10;
    ctx.beginPath();
    let axisEndX = ctx.canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', ctx.canvas.width - padding + 10, centerY + 5);
    ctx.fillText('y', centerX, padding - 5);
  }
  
  function drawArrow(ctx, p_scaled, color, lineWidth = 2) {
    const p_pixels = { x: centerX + p_scaled.x * unitSize, y: centerY - p_scaled.y * unitSize };
    const origin_pixels = { x: centerX, y: centerY };
    if (Math.hypot(p_scaled.x, p_scaled.y) < 0.01) return;
    const headlen = 10;
    const dx = p_pixels.x - origin_pixels.x;
    const dy = p_pixels.y - origin_pixels.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lineWidth;
    ctx.moveTo(origin_pixels.x, origin_pixels.y);
    ctx.lineTo(p_pixels.x, p_pixels.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle - Math.PI / 6), p_pixels.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle + Math.PI / 6), p_pixels.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function draw() {
    drawGridAndAxes(sourceCtx);
    drawGridAndAxes(targetCtx);
    const a = parseFloat(matrixInputs.a.value) || 0;
    const b = parseFloat(matrixInputs.b.value) || 0;
    const c = parseFloat(matrixInputs.c.value) || 0;
    const d = parseFloat(matrixInputs.d.value) || 0;
    const trace = a + d;
    const det = a * d - b * c;
    const discriminant = trace * trace - 4 * det;
    let lambda1, lambda2, vec1, vec2;
    if (discriminant >= 0) {
        eigenResultsDiv.style.display = 'block';
        noEigenMessageDiv.style.display = 'none';
        lambda1 = (trace + Math.sqrt(discriminant)) / 2;
        lambda2 = (trace - Math.sqrt(discriminant)) / 2;
        if (Math.abs(c) > 0.01) { vec1 = { x: lambda1 - d, y: c }; } 
        else if (Math.abs(b) > 0.01) { vec1 = { x: b, y: lambda1 - a }; } 
        else { vec1 = { x: 1, y: 0 }; }
        let mag1 = Math.hypot(vec1.x, vec1.y);
        vec1.x /= mag1; vec1.y /= mag1;
        if (Math.abs(c) > 0.01) { vec2 = { x: lambda2 - d, y: c }; } 
        else if (Math.abs(b) > 0.01) { vec2 = { x: b, y: lambda2 - a }; } 
        else { vec2 = { x: 0, y: 1 }; }
        let mag2 = Math.hypot(vec2.x, vec2.y);
        if (mag2 > 0.01) { vec2.x /= mag2; vec2.y /= mag2; }
        lambda1_disp.textContent = lambda1.toFixed(2);
        lambda2_disp.textContent = lambda2.toFixed(2);
        vec1_disp.textContent = `(${vec1.x.toFixed(2)}, ${vec1.y.toFixed(2)})`;
        vec2_disp.textContent = `(${vec2.x.toFixed(2)}, ${vec2.y.toFixed(2)})`;
    } else {
        eigenResultsDiv.style.display = 'none';
        noEigenMessageDiv.style.display = 'block';
    }
    sourceCtx.beginPath();
    sourceCtx.strokeStyle = 'gray';
    sourceCtx.lineWidth = 1;
    sourceCtx.arc(centerX, centerY, 1 * unitSize, 0, 2 * Math.PI);
    sourceCtx.stroke();
    if (vec1) {
        drawArrow(sourceCtx, vec1, '#008000', 3);
        drawArrow(sourceCtx, vec2, '#800080', 3);
    }
    targetCtx.beginPath();
    targetCtx.strokeStyle = 'orange';
    targetCtx.lineWidth = 1.5;
    for (let i = 0; i <= 2 * Math.PI; i += 0.01) {
        const v = { x: Math.cos(i), y: Math.sin(i) };
        const Av = { x: a * v.x + b * v.y, y: c * v.x + d * v.y };
        const pixels = { x: centerX + Av.x * unitSize, y: centerY - Av.y * unitSize };
        if (i === 0) targetCtx.moveTo(pixels.x, pixels.y);
        else targetCtx.lineTo(pixels.x, pixels.y);
    }
    targetCtx.closePath();
    targetCtx.stroke();
    if (vec1) {
        const trans_vec1 = { x: vec1.x * lambda1, y: vec1.y * lambda1 };
        const trans_vec2 = { x: vec2.x * lambda2, y: vec2.y * lambda2 };
        drawArrow(targetCtx, trans_vec1, '#008000', 3);
        drawArrow(targetCtx, trans_vec2, '#800080', 3);
    }
  }

  for (const key in matrixInputs) {
      matrixInputs[key].addEventListener('input', draw);
  }

  draw();
</script>
</body>
</html>
