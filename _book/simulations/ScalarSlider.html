<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כפל וקטור בסקלר</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 1px solid black;
  }
  .controls {
    margin-top: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
  }
  input[type="range"] {
    width: 300px;
  }
</style>
</head>
<body>

  <!-- שינוי 1: עדכון הכותרת -->
  <h1>כפל וקטור בסקלר</h1>
  <!-- שינוי 2: עדכון ההנחיה הראשונה -->
  <p id="instructions">לחצו על נקודה במישור כדי להגדיר וקטור</p>
  <canvas id="interactivePlane" width="600" height="600"></canvas>
  <div class="controls">
    <label for="scalar">c = </label>
    <input type="range" id="scalar" name="scalar" min="-5" max="5" value="1" step="0.1">
    <span id="scalar-value">1.0</span>
  </div>

<script>
  const canvas = document.getElementById('interactivePlane');
  const ctx = canvas.getContext('2d');
  const instructions = document.getElementById('instructions');
  const slider = document.getElementById('scalar');
  const sliderValueDisplay = document.getElementById('scalar-value');

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  const padding = 30;
  const scale = 5;
  const unitSize = (canvas.width - 2 * padding) / (scale * 2);
  
  let baseVector = null;

  function scaledToPixels(point) {
    return {
      x: centerX + point.x * unitSize,
      y: centerY - point.y * unitSize
    };
  }

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    for(let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0);
      ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize);
      ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    // ציר X
    ctx.moveTo(padding, centerY);
    ctx.lineTo(canvas.width - padding, centerY);
    // ציר Y
    ctx.moveTo(centerX, canvas.height - padding);
    ctx.lineTo(centerX, padding);
    ctx.stroke();

    // --- שינוי 3: הוספת חיצים ותוויות לצירים ---
    const headlen = 10;
    // חץ לציר X
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    // חץ לציר Y
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.fillText('x', canvas.width - padding + 10, centerY);
    ctx.fillText('y', centerX, padding - 15);
    // ------------------------------------------
  }

  function drawArrow(p1, p2, color) {
    const headlen = 10;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const angle = Math.atan2(dy, dx);

    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }
  
  function drawVectorLabel(text, p1, p2, color) {
    const midX = (p1.x + p2.x) / 2;
    const midY = (p1.y + p2.y) / 2 - 10;
    
    ctx.fillStyle = color;
    ctx.font = 'italic bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(text, midX, midY);
  }

  function drawScene() {
    drawGrid();
    
    if (!baseVector) {
      return;
    }

    const c = parseFloat(slider.value);
    const origin = {x: 0, y: 0};

    const scaledVector = {
      x: baseVector.x * c,
      y: baseVector.y * c
    };

    const origin_p = scaledToPixels(origin);
    const baseVector_p = scaledToPixels(baseVector);
    const scaledVector_p = scaledToPixels(scaledVector);

    drawArrow(origin_p, baseVector_p, 'gray');
    drawVectorLabel('v', origin_p, baseVector_p, 'gray');

    drawArrow(origin_p, scaledVector_p, 'red');
    drawVectorLabel('cv', origin_p, scaledVector_p, 'red');
  }

  canvas.addEventListener('click', function(event) {
    const rect = canvas.getBoundingClientRect();
    const pixelX = event.clientX - rect.left;
    const pixelY = event.clientY - rect.top;

    const scaledX = (pixelX - centerX) / unitSize;
    const scaledY = ((pixelY - centerY) * -1) / unitSize;

    baseVector = {x: scaledX, y: scaledY};
    
    // שינוי 2: עדכון ההנחיה השנייה
    instructions.textContent = 'הזיזו את המחוון כדי לשנות את ערך הסקלר';
    
    drawScene();
  });

  slider.addEventListener('input', function() {
    sliderValueDisplay.textContent = parseFloat(this.value).toFixed(1);
    drawScene();
  });

  drawGrid();

</script>

</body>
</html>
