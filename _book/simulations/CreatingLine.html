<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הצגה פרמטרית של ישר</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 1px solid black;
    cursor: crosshair;
  }
  #controls {
    margin-top: 15px;
    display: none;
    align-items: center;
    gap: 15px;
  }
  input[type="number"] {
    width: 60px;
  }
</style>
</head>
<body>

  <h1>הצגה פרמטרית של ישר</h1>
  <p id="instructions">לחצו על נקודת ההתחלה של הישר</p>
  <canvas id="interactivePlane" width="600" height="600"></canvas>
  <div id="controls">
    <!-- שינוי טקסט -->
    <label>וקטור הכיוון:</label>
    ( <input type="number" id="vx" value="2" step="0.1"> ,
      <input type="number" id="vy" value="1" step="0.1"> )
    <button id="animateButton">צרו את הישר</button>
  </div>

<script>
  const canvas = document.getElementById('interactivePlane');
  const ctx = canvas.getContext('2d');
  const instructions = document.getElementById('instructions');
  const controlsDiv = document.getElementById('controls');
  const vxInput = document.getElementById('vx');
  const vyInput = document.getElementById('vy');
  const animateButton = document.getElementById('animateButton');

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const scale = 10;
  const unitSize = canvas.width / (scale * 2);
  const padding = 30;
  
  let startPoint = null;
  let directionVector = null;
  let animationId = null;
  let t = 0;
  let animationPhase = 0;
  let phaseStartTime = 0;
  
  function scaledToPixels(point) { return { x: centerX + point.x * unitSize, y: centerY - point.y * unitSize }; }
  function pixelsToScaled(point) { return { x: (point.x - centerX) / unitSize, y: (point.y - centerY) / -unitSize }; }
  
  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#ddd';
    for (let i = -scale; i <= scale; i++) {
      ctx.moveTo(centerX + i * unitSize, 0); ctx.lineTo(centerX + i * unitSize, canvas.height);
      ctx.moveTo(0, centerY + i * unitSize); ctx.lineTo(canvas.width, centerY + i * unitSize);
    }
    ctx.stroke();
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;

    ctx.moveTo(padding, centerY); ctx.lineTo(canvas.width - padding, centerY);
    ctx.moveTo(centerX, canvas.height - padding); ctx.lineTo(centerX, padding);
    ctx.stroke();

    const headlen = 10;
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    let axisEndX = canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', canvas.width - padding + 10, centerY);
    ctx.fillText('y', centerX, padding - 15);
  }

  function drawArrow(p1, p2, color) {
    const headlen = 10;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle - Math.PI / 6), p2.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p2.x - headlen * Math.cos(angle + Math.PI / 6), p2.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function drawPoint(p, color = 'black', radius = 5) {
      const p_pixels = scaledToPixels(p);
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.arc(p_pixels.x, p_pixels.y, radius, 0, 2 * Math.PI);
      ctx.fill();
  }

  let isResetting = false;

  function reset() {
      if (isResetting) return;
      isResetting = true;
      if (animationId) cancelAnimationFrame(animationId);
      startPoint = null;
      directionVector = null;
      animationId = null;
      t = 0;
      animationPhase = 0;
      controlsDiv.style.display = 'none';
      instructions.textContent = 'לחצו על נקודת ההתחלה של הישר';
      drawGrid();
      canvas.removeEventListener('click', reset);
      isResetting = false;
  }

  canvas.addEventListener('click', (event) => {
    if (startPoint) return;
    const rect = canvas.getBoundingClientRect();
    const pixelPos = { x: event.clientX - rect.left, y: event.clientY - rect.top };
    startPoint = pixelsToScaled(pixelPos);
    drawGrid();
    drawPoint(startPoint, 'blue');
    instructions.textContent = 'הזינו וקטור כיוון ולחצו "צרו את הישר"'; // שינוי טקסט
    controlsDiv.style.display = 'flex';
  });

  animateButton.addEventListener('click', () => {
    if (!startPoint || animationId) return;
    const vx = parseFloat(vxInput.value);
    const vy = parseFloat(vyInput.value);
    if (isNaN(vx) || isNaN(vy) || (vx === 0 && vy === 0)) {
      alert('וקטור הכיוון לא יכול להיות וקטור האפס.');
      return;
    }
    directionVector = { x: vx, y: vy };
    controlsDiv.style.display = 'none';
    animationPhase = 1;
    phaseStartTime = performance.now();
    animate();
  });

  function animate(currentTime) {
    animationId = requestAnimationFrame(animate);
    drawGrid();
    if(startPoint) drawPoint(startPoint, 'blue');
    const origin_pixels = scaledToPixels({x:0, y:0});
    const dv_end_pixels = scaledToPixels(directionVector);
    const sp_pixels = scaledToPixels(startPoint);
    const sp_plus_dv_pixels = scaledToPixels({x: startPoint.x + directionVector.x, y: startPoint.y + directionVector.y});
    if (animationPhase === 1) {
      instructions.textContent = 'שלב 1: זהו וקטור הכיוון שבחרתם';
      drawArrow(origin_pixels, dv_end_pixels, 'red');
      if (currentTime - phaseStartTime > 1500) {
        phaseStartTime = currentTime;
        animationPhase = 2;
      }
    }
    else if (animationPhase === 2) {
      instructions.textContent = 'שלב 2: מזיזים את הוקטור לנקודת ההתחלה';
      drawArrow(sp_pixels, sp_plus_dv_pixels, '#8A2BE2');
      if (currentTime - phaseStartTime > 1500) {
        phaseStartTime = currentTime;
        animationPhase = 3;
      }
    }
    else if (animationPhase === 3) {
      instructions.textContent = 'שלב 3: מותחים את הוקטור לאינסוף ליצירת הישר';
      drawArrow(sp_pixels, sp_plus_dv_pixels, '#8A2BE2');
      const p_positive = { x: startPoint.x + t * directionVector.x, y: startPoint.y + t * directionVector.y, };
      const p_negative = { x: startPoint.x - t * directionVector.x, y: startPoint.y - t * directionVector.y, };
      const p_pos_pixels = scaledToPixels(p_positive);
      const p_neg_pixels = scaledToPixels(p_negative);
      ctx.beginPath();
      ctx.strokeStyle = 'blue';
      ctx.lineWidth = 2.5;
      ctx.moveTo(p_neg_pixels.x, p_neg_pixels.y);
      ctx.lineTo(p_pos_pixels.x, p_pos_pixels.y);
      ctx.stroke();
      t += 0.1;
      if (t > scale * 1.5) {
        animationPhase = 4;
      }
    }
    else if (animationPhase === 4) {
      cancelAnimationFrame(animationId);
      animationId = null;
      instructions.textContent = 'הישר נוצר! לחצו על המישור כדי להתחיל מחדש.';
      canvas.addEventListener('click', reset, { once: true });
    }
  }

  drawGrid();
</script>
</body>
</html>
