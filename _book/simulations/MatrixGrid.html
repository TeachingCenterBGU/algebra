<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טרנספורמציה ליניארית של רשת</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  .container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .canvas-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  canvas {
    border: 1px solid black;
  }
  #matrix-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
  }
  #matrix-input {
    display: grid;
    grid-template-columns: 50px 50px;
    gap: 10px;
    align-items: center;
    justify-content: center;
    direction: ltr;
  }
  .bracket {
      font-size: 3.5em;
      font-weight: lighter;
      color: #555;
  }
  input[type="number"] {
    width: 40px;
    font-size: 1.1em;
    text-align: center;
  }
</style>
</head>
<body>

  <h1>כפל במטריצה והשפעתו על המישור</h1>
  <p>הזינו את ערכי המטריצה וראו כיצד היא משפיעה על וקטורי הבסיס ועל רשת הנקודות</p>

  <div id="matrix-container">
    <span>A =</span>
    <span class="bracket">(</span>
    <div id="matrix-input">
      <input type="number" id="a11" value="2">
      <input type="number" id="a12" value="1">
      <input type="number" id="a21" value="1">
      <input type="number" id="a22" value="1.5">
    </div>
    <span class="bracket">)</span>
  </div>

  <div class="container">
    <div class="canvas-container">
      <h3>מרחב המקור</h3>
      <canvas id="sourceCanvas" width="500" height="500"></canvas>
    </div>
    <div class="canvas-container">
      <h3>מרחב התמונה</h3>
      <canvas id="targetCanvas" width="500" height="500"></canvas>
    </div>
  </div>

<script>
  const sourceCanvas = document.getElementById('sourceCanvas');
  const targetCanvas = document.getElementById('targetCanvas');
  const sourceCtx = sourceCanvas.getContext('2d');
  const targetCtx = targetCanvas.getContext('2d');
  
  const matrixInputs = {
      a11: document.getElementById('a11'), a12: document.getElementById('a12'),
      a21: document.getElementById('a21'), a22: document.getElementById('a22')
  };

  const centerX = sourceCanvas.width / 2;
  const centerY = sourceCanvas.height / 2;
  const scale = 5;
  const unitSize = sourceCanvas.width / (scale * 2);

  function drawGridAndAxes(ctx) {
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    const padding = 20;
    ctx.beginPath();
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.moveTo(padding, centerY); ctx.lineTo(ctx.canvas.width - padding, centerY);
    ctx.moveTo(centerX, ctx.canvas.height - padding); ctx.lineTo(centerX, padding);
    ctx.stroke();

    const headlen = 10;
    ctx.beginPath();
    let axisEndX = ctx.canvas.width - padding;
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY - headlen / 2);
    ctx.moveTo(axisEndX, centerY);
    ctx.lineTo(axisEndX - headlen, centerY + headlen / 2);
    
    let axisEndY = padding;
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX - headlen / 2, axisEndY + headlen);
    ctx.moveTo(centerX, axisEndY);
    ctx.lineTo(centerX + headlen / 2, axisEndY + headlen);
    ctx.stroke();

    ctx.fillStyle = 'black';
    ctx.font = 'italic 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x', ctx.canvas.width - padding + 10, centerY + 5);
    ctx.fillText('y', centerX, padding - 5);
  }
  
  function drawArrow(ctx, p_scaled, color) {
    const p_pixels = { x: centerX + p_scaled.x * unitSize, y: centerY - p_scaled.y * unitSize };
    const origin_pixels = { x: centerX, y: centerY };
    
    const headlen = 10;
    const dx = p_pixels.x - origin_pixels.x;
    const dy = p_pixels.y - origin_pixels.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.moveTo(origin_pixels.x, origin_pixels.y);
    ctx.lineTo(p_pixels.x, p_pixels.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle - Math.PI / 6), p_pixels.y - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(p_pixels.x, p_pixels.y);
    ctx.lineTo(p_pixels.x - headlen * Math.cos(angle + Math.PI / 6), p_pixels.y - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function drawPoint(ctx, p_scaled, color, radius = 4) {
      const p_pixels = { x: centerX + p_scaled.x * unitSize, y: centerY - p_scaled.y * unitSize };
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.arc(p_pixels.x, p_pixels.y, radius, 0, 2 * Math.PI);
      ctx.fill();
  }

  function drawLine(ctx, p1_scaled, p2_scaled, color, lineWidth = 1) {
      const p1_pixels = { x: centerX + p1_scaled.x * unitSize, y: centerY - p1_scaled.y * unitSize };
      const p2_pixels = { x: centerX + p2_scaled.x * unitSize, y: centerY - p2_scaled.y * unitSize };
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.moveTo(p1_pixels.x, p1_pixels.y);
      ctx.lineTo(p2_pixels.x, p2_pixels.y);
      ctx.stroke();
  }

  function draw() {
    drawGridAndAxes(sourceCtx);
    drawGridAndAxes(targetCtx);

    const a11 = parseFloat(matrixInputs.a11.value) || 0;
    const a12 = parseFloat(matrixInputs.a12.value) || 0;
    const a21 = parseFloat(matrixInputs.a21.value) || 0;
    const a22 = parseFloat(matrixInputs.a22.value) || 0;

    const i_hat = { x: 1, y: 0 };
    const j_hat = { x: 0, y: 1 };
    const trans_i_hat = { x: a11, y: a21 };
    const trans_j_hat = { x: a12, y: a22 };

    // --- ציור מרחב המקור ---
    const gridRange = 10;
    for (let i = -gridRange; i <= gridRange; i += 0.5) {
        const isIntegerLine = (i % 1 === 0);
        const sourceLineColor = isIntegerLine ? 'black' : '#ccc';
        drawLine(sourceCtx, {x: i, y: -gridRange}, {x: i, y: gridRange}, sourceLineColor, isIntegerLine ? 1 : 0.5);
        drawLine(sourceCtx, {x: -gridRange, y: i}, {x: gridRange, y: i}, sourceLineColor, isIntegerLine ? 1 : 0.5);
    }
    for (let i = -scale; i <= scale; i += 0.5) {
        for (let j = -scale; j <= scale; j += 0.5) {
            const isIntegerPoint = (i % 1 === 0) && (j % 1 === 0);
            const sourcePoint = { x: i, y: j };
            const sourceColor = isIntegerPoint ? 'gray' : '#ccc';
            drawPoint(sourceCtx, sourcePoint, sourceColor, isIntegerPoint ? 4 : 2);
        }
    }

    // --- ציור מרחב התמונה (עם מילוי חורים) ---
    const extendedRange = gridRange * 2;
    for (let i = -extendedRange; i <= extendedRange; i += 0.5) {
        const isIntegerLine = (i % 1 === 0);
        const targetLineColor = isIntegerLine ? 'orange' : 'rgba(255, 165, 0, 0.3)';
        const p1_t = {x: a11*i - a12*extendedRange, y: a21*i - a22*extendedRange};
        const p2_t = {x: a11*i + a12*extendedRange, y: a21*i + a22*extendedRange};
        drawLine(targetCtx, p1_t, p2_t, targetLineColor, isIntegerLine ? 1 : 0.5);
        const p3_t = {x: -a11*extendedRange + a12*i, y: -a21*extendedRange + a22*i};
        const p4_t = {x: a11*extendedRange + a12*i, y: a21*extendedRange + a22*i};
        drawLine(targetCtx, p3_t, p4_t, targetLineColor, isIntegerLine ? 1 : 0.5);
    }
    for (let i = -extendedRange; i <= extendedRange; i += 0.5) {
        for (let j = -extendedRange; j <= extendedRange; j += 0.5) {
            const targetPoint = {
                x: i * trans_i_hat.x + j * trans_j_hat.x,
                y: i * trans_i_hat.y + j * trans_j_hat.y
            };
            if (Math.abs(targetPoint.x) < scale * 1.2 && Math.abs(targetPoint.y) < scale * 1.2) {
                const isIntegerPoint = (i % 1 === 0) && (j % 1 === 0);
                const targetColor = isIntegerPoint ? 'orange' : 'rgba(255, 165, 0, 0.5)';
                drawPoint(targetCtx, targetPoint, targetColor, isIntegerPoint ? 4 : 2);
            }
        }
    }

    // ציור וקטורי הבסיס
    drawArrow(sourceCtx, i_hat, 'blue');
    drawArrow(sourceCtx, j_hat, 'green');
    drawArrow(targetCtx, trans_i_hat, 'blue');
    drawArrow(targetCtx, trans_j_hat, 'green');
  }

  for (const key in matrixInputs) {
      matrixInputs[key].addEventListener('input', draw);
  }

  draw();
</script>
</body>
</html>
